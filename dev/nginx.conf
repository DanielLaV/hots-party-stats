# Mirrors deploy/hots.subdomain.conf's routing (path-based /api/ to the
# Flask API, everything else static) so what works here behaves the same
# once deployed -- just on localhost, with no TLS/domain needed.
server {
    listen 80;

    location /api/ {
        proxy_pass http://hots-api:8000/api/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
