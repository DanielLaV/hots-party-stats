# SWAG reverse-proxy config for hots.yourdomain.example.com
#
# Copy this into your SWAG container's proxy-confs folder, e.g.:
#   /mnt/user/appdata/swag/nginx/proxy-confs/hots.subdomain.conf
# (must NOT keep a .sample extension -- SWAG only loads files without it)
#
# Requires:
#   - A CNAME (or A) record for hots.yourdomain.example.com pointing at your SWAG instance
#   - hots.yourdomain.example.com covered by SWAG's certificate -- automatic if you're
#     using a wildcard cert (*.yourdomain.example.com); if SWAG issues one cert per
#     subdomain instead (the SUBDOMAINS= env var), add "hots" to that list
#     and restart SWAG so it reissues the cert to include it
#   - The hots-dashboard and hots-api containers (see docker-compose.yml) on
#     the same docker network as SWAG, so SWAG can resolve them by name

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name hots.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    # Routed to the Flask API by path, same domain as the static dashboard --
    # keeps everything same-origin (no CORS needed) and needs no separate
    # subdomain/cert. Must come before the / block below since nginx matches
    # the longest prefix, not declaration order, but keeping the specific
    # one first is clearer to read.
    #
    # proxy_pass deliberately has NO trailing URI here, even though this
    # location is a /api/ prefix -- nginx only does its usual "strip the
    # matched location prefix, append the rest" rewriting when proxy_pass's
    # target is a static string. Since upstream_app/upstream_port are
    # variables (required so this resolves via Docker's DNS at request time,
    # not once at nginx startup), any URI written after them is instead used
    # literally as a fixed path, silently dropping the rest of the request
    # (e.g. /api/fearless would've been forwarded as just /api/, a 404 in
    # Flask). Omitting it entirely passes the original request URI through
    # unchanged, which is what we actually want.
    location /api/ {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app hots-api;
        set $upstream_port 8000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app hots-dashboard;
        set $upstream_port 80;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
